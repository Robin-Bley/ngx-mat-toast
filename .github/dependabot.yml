version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
    ignore:
      - dependency-name: typescript
        versions: ['7.x']
    groups:
      all-dependencies:
        patterns:
          - '*'
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - github-actions
    groups:
      all-dependencies:
        patterns:
          - '*'
