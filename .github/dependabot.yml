version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-dependencies:
        patterns:
          - '*'
    # Angular 22+ uses TypeScript 6.x; only ignore future major versions until verified.
    ignore:
      - dependency-name: 'typescript'
        versions: ['>=7.0.0']
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - github-actions
    groups:
      all-dependencies:
        patterns:
          - '*'
